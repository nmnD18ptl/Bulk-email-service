# ── Mailpit profile — local email testing ────────────────────────────────────
# Routes all outbound SMTP through Mailpit, which captures messages without
# forwarding them.  View captured emails at http://localhost:8025.
#
# Activate:
#   export SPRING_PROFILES_ACTIVE=mailpit
#   ./mvnw spring-boot:run
#
# Or combine with dev profile:
#   SPRING_PROFILES_ACTIVE=dev,mailpit ./mvnw spring-boot:run

spring:
  mail:
    host: ${MAILPIT_HOST:localhost}
    port: ${MAILPIT_PORT:1025}
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 3000
      mail.smtp.writetimeout: 5000

logging:
  level:
    org.springframework.mail: DEBUG
